<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOL 網頁內容提取工具</title>
    
    <!-- 載入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React 與 ReactDOM (讓純 HTML 也能跑 React) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 載入 Babel 編譯器 (讓瀏覽器能看懂 JSX 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 自訂捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- React 應用程式的掛載點 -->
    <div id="root"></div>

    <!-- React 程式碼 -->
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [targetUrl, setTargetUrl] = useState('https://wol.jw.org/cmn-Hant/wol/library/r24/lp-ch/%E6%89%80%E6%9C%89%E5%87%BA%E7%89%88%E7%89%A9/%E6%B4%9E%E6%82%89/a');
            const [fileTitle, setFileTitle] = useState('WOL_提取內容');
            const [status, setStatus] = useState('等待開始...');
            const [links, setLinks] = useState([]);
            const [results, setResults] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);

            // 區間選擇（1-based）
            const [startIndex, setStartIndex] = useState('');
            const [endIndex, setEndIndex] = useState('');

            const CORS_PROXY = 'https://corsproxy.io/?';

            // 方便計算目前區間（用來顯示起訖標題）
            const getClampedRange = () => {
                if (links.length === 0) return null;
                const total = links.length;
                let start = parseInt(startIndex, 10);
                let end = parseInt(endIndex, 10);

                if (isNaN(start)) start = 1;
                if (isNaN(end)) end = total;

                start = Math.max(1, Math.min(start, total));
                end = Math.max(1, Math.min(end, total));
                if (start > end) [start, end] = [end, start];

                return { start, end, total };
            };

            const rangeInfo = getClampedRange();
            const startLinkTitle =
                rangeInfo && rangeInfo.start >= 1 && rangeInfo.start <= links.length
                    ? links[rangeInfo.start - 1].title
                    : '';
            const endLinkTitle =
                rangeInfo && rangeInfo.end >= 1 && rangeInfo.end <= links.length
                    ? links[rangeInfo.end - 1].title
                    : '';

            // 1. 抓目錄頁裡的所有文章連結
            const fetchLinks = async () => {
                setIsProcessing(true);
                setStatus('正在獲取主頁面連結...');
                setLinks([]);
                setResults([]);
                setProgress(0);

                try {
                    const response = await fetch(CORS_PROXY + encodeURIComponent(targetUrl));
                    if (!response.ok) throw new Error('無法讀取頁面，可能是代理伺服器被阻擋。');
                    
                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');

                    const allAnchors = Array.from(doc.querySelectorAll('a'));
                    const extractedLinks = [];

                    allAnchors.forEach(a => {
                        const href = a.getAttribute('href');
                        if (href && href.includes('/wol/d/r24/lp-ch/')) {
                            const fullUrl = href.startsWith('http') ? href : `https://wol.jw.org${href}`;
                            if (!extractedLinks.some(link => link.url === fullUrl)) {
                                extractedLinks.push({ title: a.textContent.trim() || fullUrl, url: fullUrl });
                            }
                        }
                    });

                    setLinks(extractedLinks);

                    if (extractedLinks.length > 0) {
                        setStartIndex('1');
                        setEndIndex(String(extractedLinks.length));
                    }

                    setStatus(`成功找到 ${extractedLinks.length} 個文章連結！請設定想提取的區間，然後點擊「開始提取內容」。`);
                } catch (error) {
                    setStatus(`錯誤: ${error.message}`);
                } finally {
                    setIsProcessing(false);
                }
            };

            // 2. 依照區間逐頁提取內容
            const extractTextFromLinks = async () => {
                if (links.length === 0) return;

                const total = links.length;
                let start = parseInt(startIndex, 10);
                let end = parseInt(endIndex, 10);

                if (isNaN(start)) start = 1;
                if (isNaN(end)) end = total;

                // clamp 到合法範圍
                start = Math.max(1, Math.min(start, total));
                end = Math.max(1, Math.min(end, total));

                if (start > end) {
                    [start, end] = [end, start];
                }

                const targetCount = end - start + 1;
                const baseMessage = `將提取第 ${start} 到第 ${end} 個連結，共 ${targetCount} 個。`;

                setIsProcessing(true);
                setStatus(baseMessage + ' 開始逐頁提取內容 (為了避免被封鎖，每頁將會稍微暫停)...');
                setResults([]);
                setProgress(0);
                
                const extractedData = [];
                const targetLinks = links.slice(start - 1, end); // 0-based

                for (let i = 0; i < targetLinks.length; i++) {
                    const link = targetLinks[i];
                    const currentNumber = start + i;

                    setStatus(`正在提取 (${currentNumber}/${links.length}，區間內第 ${i + 1}/${targetLinks.length}): ${link.title}`);
                    setProgress(Math.round(((i + 1) / targetLinks.length) * 100));

                    try {
                        const response = await fetch(CORS_PROXY + encodeURIComponent(link.url));
                        if (response.ok) {
                            const htmlText = await response.text();
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlText, 'text/html');
                            
                            const articleNode =
                                doc.querySelector('article') ||
                                doc.querySelector('#article') ||
                                doc.querySelector('.bodyTxt');
                            
                            if (articleNode) {
                                // (0) 先砍掉 PhotoSwipe 這種整個外掛 DOM
                                const pswpNodes = articleNode.querySelectorAll('.pswp');
                                pswpNodes.forEach(n => n.remove());

                                // (1) 移除不需要的元素
                                const hiddenElements = articleNode.querySelectorAll(`
                                    .hidden, noscript, script, style, nav, footer, 
                                    .docSubNav, .share-wrapper, .share-buttons, 
                                    .icon, .bottom-nav, .groupFoot, ul.w-elements, 
                                    [class*="icon"], .dc-icon, .rs-icon
                                `);
                                hiddenElements.forEach(el => el.remove());

                                // (2) 刪掉實際上沒內容、只會顯示成小方框的裝飾元素
                                const emptyElements = articleNode.querySelectorAll('a, span, i, em, strong');
                                emptyElements.forEach(el => {
                                    if (el.querySelector('img')) return; // 有圖片就保留

                                    let text = el.textContent || '';

                                    // 移除常見不可見字元
                                    text = text
                                      .replace(/[\u200B-\u200D\uFEFF]/g, '')
                                      .replace(/\s+/g, '');

                                    if (text.length === 0) {
                                        el.remove();
                                    }
                                });

                                // (3) 圖片 src：相對 → 絕對
                                const images = articleNode.querySelectorAll('img');
                                images.forEach(img => {
                                    const src = img.getAttribute('src');
                                    if (src && src.startsWith('/')) {
                                        img.setAttribute('src', `https://wol.jw.org${src}`);
                                    }
                                });

                                // (4) 連結 href（含經文）：相對 → 絕對
                                const anchors = articleNode.querySelectorAll('a');
                                anchors.forEach(a => {
                                    const href = a.getAttribute('href');
                                    if (!href) return;
                                    if (href.startsWith('http://') || href.startsWith('https://')) return;
                                    if (href.startsWith('#')) return; // 頁內錨點保留

                                    if (href.startsWith('/')) {
                                        a.setAttribute('href', `https://wol.jw.org${href}`);
                                    } else {
                                        a.setAttribute('href', `https://wol.jw.org/${href}`);
                                    }
                                });

                                // (5) 組純文字內容，順便洗掉會變成空心框框的字元
                                let rawText = articleNode.textContent || '';
                                rawText = rawText
                                  .replace(/[\u200B-\u200D\uFEFF]/g, '')   // 零寬空白 / BOM
                                  .replace(/[\uE000-\uF8FF]/g, '');        // 私用區（常拿來當 icon）

                                const cleanedText = rawText
                                  .replace(/\s+/g, ' ')
                                  .trim();

                                extractedData.push({
                                    title: link.title,
                                    url: link.url,
                                    content: cleanedText,
                                    htmlContent: articleNode.innerHTML
                                });
                            } else {
                                extractedData.push({ 
                                    title: link.title, 
                                    url: link.url, 
                                    content: "無法找到文章主體內容。", 
                                    htmlContent: "<p>無法找到文章主體內容。</p>" 
                                });
                            }
                        }
                        setResults([...extractedData]);
                    } catch (error) {
                        console.error(`提取 ${link.url} 失敗:`, error);
                        extractedData.push({ 
                            title: link.title, 
                            url: link.url, 
                            content: "加載失敗。", 
                            htmlContent: "<p>加載失敗。</p>" 
                        });
                    }

                    // 避免被當成機器人，一頁休息一下
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }

                setStatus(`提取完成！本次共處理第 ${start} 到第 ${end} 個連結（${targetLinks.length} 筆）。您可以選擇下載 TXT 或 HTML 格式。`);
                setIsProcessing(false);
            };

            // 3. 下載 TXT
            const downloadText = () => {
                if (results.length === 0) return;
                
                let textContent = `========== ${fileTitle} ==========\n\n`;
                results.forEach(item => {
                    textContent += `==========\n`;
                    textContent += `標題: ${item.title}\n`;
                    textContent += `網址: ${item.url}\n`;
                    textContent += `內容:\n${item.content}\n\n`;
                });

                const blob = new Blob(['\uFEFF' + textContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${fileTitle}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // 4. 下載 HTML
            const downloadHtml = () => {
                if (results.length === 0) return;

                let htmlString = `
                    <!DOCTYPE html>
                    <html lang="zh-Hant">
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <title>${fileTitle}</title>
                        <style>
                            body { 
                                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
                                max-width: 900px; 
                                margin: 0 auto; 
                                padding: 20px; 
                                line-height: 1.8; 
                                background-color: #f9fafb;
                                color: #333;
                            }
                            h1.main-title { 
                                text-align: center; 
                                color: #111827; 
                                padding-bottom: 20px;
                                border-bottom: 2px solid #e5e7eb;
                            }
                            .article-card { 
                                background: white; 
                                margin-bottom: 40px; 
                                padding: 30px; 
                                border-radius: 12px; 
                                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                                border: 1px solid #e5e7eb;
                            }
                            .article-title { 
                                color: #1d4ed8; 
                                margin-top: 0; 
                                font-size: 1.8em;
                            }
                            .article-meta {
                                font-size: 0.9em;
                                margin-bottom: 20px;
                                padding-bottom: 15px;
                                border-bottom: 1px solid #f3f4f6;
                            }
                            .article-meta a { 
                                color: #3b82f6; 
                                text-decoration: none; 
                                word-break: break-all;
                            }
                            .article-meta a:hover { 
                                text-decoration: underline; 
                            }
                            .article-content img {
                                max-width: 100%;
                                height: auto;
                                border-radius: 8px;
                                margin: 15px 0;
                            }
                            .article-content a {
                                color: #2563eb;
                            }
                        </style>
                    </head>
                    <body>
                        <h1 class="main-title">${fileTitle}</h1>
                `;

                results.forEach(item => {
                    htmlString += `
                        <div class="article-card">
                            <h2 class="article-title">${item.title}</h2>
                            <div class="article-meta">
                                <span>來源網址：</span>
                                <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.url}</a>
                            </div>
                            <div class="article-content">
                                ${item.htmlContent}
                            </div>
                        </div>
                    `;
                });

                htmlString += `
                    </body>
                    </html>
                `;

                const blob = new Blob(['\uFEFF' + htmlString], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${fileTitle}.html`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-gray-800">
                    <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                        <div className="p-6 bg-blue-600 text-white flex items-center gap-4">
                            <img
                                src="take_article_logo.png"
                                alt="WOL Scraper Logo"
                                className="w-10 h-10 rounded-lg bg-white/10 object-contain"
                            />
                            <div>
                                <h1 className="text-2xl font-bold">網頁內容提取工具 (WOL Scraper)</h1>
                                <p className="mt-2 text-blue-100">
                                    支援提取純文字與完整 HTML 排版格式，支援連結區間選擇、相對連結改為絕對連結。
                                </p>
                            </div>
                        </div>
                        
                        <div className="p-6 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">目標目錄網址</label>
                                    <input 
                                        type="text" 
                                        value={targetUrl}
                                        onChange={(e) => setTargetUrl(e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                        disabled={isProcessing}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">自訂檔案名稱與大標題</label>
                                    <input 
                                        type="text" 
                                        value={fileTitle}
                                        onChange={(e) => setFileTitle(e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                        disabled={isProcessing}
                                        placeholder="例如：洞悉_A_內容彙整"
                                    />
                                </div>
                            </div>

                            {/* 區間選擇 + 起訖標題顯示 */}
                            <div className="space-y-3">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            提取起始編號（從第幾個）
                                        </label>
                                        <input
                                            type="number"
                                            min="1"
                                            value={startIndex}
                                            onChange={(e) => setStartIndex(e.target.value)}
                                            className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                            disabled={isProcessing || links.length === 0}
                                            placeholder="例如：11"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            提取結束編號（到第幾個）
                                        </label>
                                        <input
                                            type="number"
                                            min="1"
                                            value={endIndex}
                                            onChange={(e) => setEndIndex(e.target.value)}
                                            className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                            disabled={isProcessing || links.length === 0}
                                            placeholder="例如：301"
                                        />
                                    </div>
                                    <div className="text-sm text-gray-500 md:text-right">
                                        {links.length > 0 ? (
                                            <p>目前共找到 {links.length} 個連結，可輸入 1 ～ {links.length} 的任意區間。</p>
                                        ) : (
                                            <p>先按「獲取頁面連結」，才能設定區間。</p>
                                        )}
                                    </div>
                                </div>

                                {links.length > 0 && rangeInfo && (
                                    <div className="bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm text-gray-700 space-y-1">
                                        <p>
                                            起始第 {rangeInfo.start} 個標題：
                                            <span className="font-medium">
                                                {startLinkTitle || '（超出範圍，沒有對應連結）'}
                                            </span>
                                        </p>
                                        <p>
                                            結束第 {rangeInfo.end} 個標題：
                                            <span className="font-medium">
                                                {endLinkTitle || '（超出範圍，沒有對應連結）'}
                                            </span>
                                        </p>
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-wrap gap-3">
                                <button 
                                    onClick={fetchLinks} 
                                    disabled={isProcessing}
                                    className={`px-5 py-2.5 rounded-lg font-medium text-white shadow-sm transition ${isProcessing ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:bg-blue-800'}`}
                                >
                                    1. 獲取頁面連結
                                </button>
                                <button 
                                    onClick={extractTextFromLinks} 
                                    disabled={isProcessing || links.length === 0}
                                    className={`px-5 py-2.5 rounded-lg font-medium text-white shadow-sm transition ${isProcessing || links.length === 0 ? 'bg-gray-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800'}`}
                                >
                                    2. 開始提取內容（依照上方區間）
                                </button>
                                
                                <div className="flex-grow"></div>

                                <button 
                                    onClick={downloadText} 
                                    disabled={results.length === 0 || isProcessing}
                                    className={`px-5 py-2.5 rounded-lg font-medium text-white shadow-sm transition ${results.length === 0 || isProcessing ? 'bg-gray-400 cursor-not-allowed' : 'bg-gray-700 hover:bg-gray-800 active:bg-gray-900'}`}
                                >
                                    下載 TXT
                                </button>
                                <button 
                                    onClick={downloadHtml} 
                                    disabled={results.length === 0 || isProcessing}
                                    className={`px-5 py-2.5 rounded-lg font-medium text-white shadow-sm transition flex items-center gap-2 ${results.length === 0 || isProcessing ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800'}`}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    下載 HTML (推薦)
                                </button>
                            </div>

                            <div className="bg-blue-50 border border-blue-100 p-4 rounded-lg">
                                <h3 className="font-semibold text-blue-900 mb-2">系統狀態:</h3>
                                <p className="text-sm text-blue-800">{status}</p>
                                {isProcessing && (
                                    <div className="mt-3 w-full bg-blue-200 rounded-full h-2">
                                        <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                    </div>
                                )}
                            </div>

                            {results.length > 0 && (
                                <div className="mt-8 border-t border-gray-200 pt-6">
                                    <h3 className="font-semibold text-xl mb-4 text-gray-800">
                                        提取預覽 ({results.length} / {links.length})
                                    </h3>
                                    <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                        {results.map((item, idx) => (
                                            <div key={idx} className="bg-white border border-gray-200 rounded-lg p-5 shadow-sm hover:shadow-md transition">
                                                <h4 className="font-bold text-lg text-blue-800 mb-1">{item.title}</h4>
                                                <a
                                                    href={item.url}
                                                    target="_blank"
                                                    rel="noreferrer"
                                                    className="text-xs text-gray-500 hover:text-blue-600 hover:underline break-all mb-3 block"
                                                >
                                                    {item.url}
                                                </a>
                                                <p className="text-sm text-gray-600 line-clamp-3 leading-relaxed">
                                                    {item.content}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
